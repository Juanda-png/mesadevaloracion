<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesa de Valoración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0F1A1C; --ink-soft:#27332F; --paper:#E9EAE3; --card:#FFFFFF; --card-2:var(--card-2);
  --line:#D8D9CF; --line-soft:#E7E8DF; --muted:#6B7166; --muted-2:#909488;
  --brass:#1E3F66; --brass-deep:#15314F; --brass-tint:#E6ECF3; --on-brass:#FFFFFF; --entry:#1E3F66; --entry-bg:#E6ECF3;
  --m-evfcf:#15181C; --m-pe:#15181C; --m-evebitda:#15181C; --m-evebit:#15181C;
  --pos:#1F7A52; --pos-tint:#E2F0E8; --neg:#B23A2E; --neg-tint:#F5E4E1;
  --warn:#9A6B1E; --warn-tint:#F4ECDA;
  --blue:#2E5A86; --blue-tint:#E3ECF3; --hero-bg:#0F1A1C; --hover:#F1EDE3;
  --radius:4px; --shadow:0 1px 2px rgba(15,26,28,.06),0 8px 24px rgba(15,26,28,.06);
}
[data-theme="dark"]{
  --ink:#E7E9E2; --ink-soft:#C2C6BC; --paper:#14161A; --card:#1D2024; --card-2:#22262B;
  --line:#31353B; --line-soft:#282C31; --muted:#9BA096; --muted-2:#787D74;
  --brass:#FFFFFF; --brass-deep:#EDEFEA; --brass-tint:#242A32; --on-brass:#15181C; --entry:#FFFFFF; --entry-bg:#242A32;
  --m-evfcf:#FFFFFF; --m-pe:#FFFFFF; --m-evebitda:#FFFFFF; --m-evebit:#FFFFFF;
  --pos:#46B07F; --pos-tint:#182A20; --neg:#D66A5C; --neg-tint:#2E1D19;
  --warn:#DDB162; --warn-tint:#2C2616;
  --blue:#6098CC; --blue-tint:#182530; --hero-bg:#0C0E11; --hover:#262A31;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.4);
}
#btnTheme{padding:8px}
#btnTheme svg{width:16px; height:16px}
#btnTheme .ic-sun{display:none}
[data-theme="dark"] #btnTheme .ic-sun{display:block}
[data-theme="dark"] #btnTheme .ic-moon{display:none}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:"Source Sans 3",system-ui,sans-serif; font-size:14px; line-height:1.45;
  -webkit-font-smoothing:antialiased; font-variant-numeric:tabular-nums;
}
.mono{font-family:"Source Sans 3",system-ui,sans-serif; font-variant-numeric:tabular-nums}
h1,h2,h3{font-family:"Source Sans 3",system-ui,sans-serif; font-weight:700; margin:0; letter-spacing:-0.01em}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select,textarea{font-family:inherit; font-size:14px; color:var(--ink); font-variant-numeric:tabular-nums}
a{color:var(--brass-deep)}

/* ---------- detalle: sub-pestañas ---------- */
.dtabs{display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--line)}
.dtab{padding:10px 16px; font-size:13.5px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px; border-radius:0}
.dtab:hover{color:var(--ink-soft)}
.dtab.active{color:var(--ink); border-bottom-color:var(--brass)}

/* ---------- fundamentales ---------- */
.fund-kpis{display:grid; grid-template-columns:repeat(6,1fr); gap:12px}
.fkpi{border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; background:var(--card-2)}
.fkpi .fk{font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:5px}
.fkpi .fv{font-size:19px; font-weight:700; color:var(--ink)}
.fchart-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px}
.fchart{border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px 8px; background:var(--card-2)}
.fchart-h{display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:6px}
.fchart-h span{font-weight:700; font-size:13.5px}
.fchart-h b{font-size:11px; color:var(--muted); font-weight:500}
.chart-empty{font-size:12px; color:var(--muted); padding:34px 8px; text-align:center}
.ftable{width:100%; border-collapse:collapse; font-size:12.5px; white-space:nowrap}
.ftable th{text-align:right; padding:7px 9px; font-size:11px; color:var(--muted); font-weight:600; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--card)}
.ftable th.rl{text-align:left}
.ftable td{text-align:right; padding:6px 9px; border-bottom:1px solid var(--line-soft)}
.ftable td.rl{text-align:left; color:var(--ink-soft)}
.ftable td.v{font-variant-numeric:tabular-nums}
.ftable td.sp{padding:2px 6px}
.ftable tr.grp td{border-top:1px solid var(--line)}
.ftable tr.grp td.rl{font-weight:700; color:var(--ink)}
.ftable tbody tr:hover td{background:var(--brass-tint)}
.ftable tr.proj-item td{background:var(--brass-tint)}
.ftable tr.proj-item td.rl{font-weight:600; color:var(--brass-deep)}
.proj-tag{display:inline-block; font-size:9px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--on-brass); background:var(--brass); padding:1px 6px; border-radius:100px; margin-left:7px; vertical-align:middle}
.ftabs{display:flex; gap:6px; margin:2px 0 16px; flex-wrap:wrap}
.ftab{padding:8px 15px; font-size:13px; font-weight:600; color:var(--muted); background:var(--card-2); border:1px solid var(--line); border-radius:100px}
.ftab:hover{color:var(--ink-soft); border-color:var(--muted-2)}
.ftab.active{color:var(--on-brass); background:var(--brass); border-color:var(--brass)}
.chart-legend{display:flex; flex-wrap:wrap; gap:8px 14px; margin-top:8px; justify-content:center}
.chart-legend span{display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); font-weight:600}
.chart-legend i{width:11px; height:3px; border-radius:2px; display:inline-block}
@media (max-width:820px){.fund-kpis{grid-template-columns:repeat(3,1fr)} .fchart-grid{grid-template-columns:1fr}}

/* ---------- logo mark (reutilizable) ---------- */
.pf-logo{display:inline-flex; flex-direction:column; line-height:1; user-select:none; gap:0; font-family:"Poppins","Source Sans 3",system-ui,sans-serif}
.pf-logo .l1{font-size:1em; font-weight:800; letter-spacing:-.02em; color:inherit}
.pf-logo .l2{font-size:1em; font-weight:800; letter-spacing:-.02em; color:inherit; position:relative; display:inline-block}
.pf-logo .l2 .idot{position:relative; display:inline-block}
.pf-logo .l2 .idot::before{content:''; position:absolute; width:.16em; height:.16em; border-radius:50%; background:currentColor; top:.06em; left:50%; transform:translateX(-50%)}

/* ---------- dashboard hero ---------- */
.dash-hero{
  background:var(--hero-bg);
  color:#F2EFE6;
  padding:48px 32px 36px;
  display:flex; align-items:flex-end; justify-content:space-between; gap:24px;
  border-bottom:2px solid var(--brass);
  flex-wrap:wrap;
}
.dash-hero .hero-logo{
  color:#F2EFE6; font-size:52px;
}
.dash-hero .hero-tag{
  font-size:11px; letter-spacing:.22em; text-transform:uppercase;
  color:#F2EFE6; margin-top:10px; font-weight:600;
}
.dash-hero .hero-tagrow{display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.dash-hero .hero-tagrow .hero-tag{margin-top:10px}
.hero-analyst{margin-top:10px; background:transparent; border:none; font-family:inherit;
  color:#F2EFE6; font-size:12px; font-weight:700; letter-spacing:.02em;
  padding:3px 10px; width:150px; border-radius:6px; border-left:1px solid rgba(242,239,230,.28)}
.hero-analyst::placeholder{color:rgba(242,239,230,.45); font-weight:600}
.hero-analyst:hover{background:rgba(242,239,230,.08)}
.hero-analyst:focus{outline:none; background:rgba(242,239,230,.13); color:#fff}
.dash-hero .hero-chips{
  display:flex; gap:20px; align-items:flex-end; padding-bottom:4px; flex-wrap:wrap;
}
.dash-hero .hchip{text-align:right; color:#F2EFE6}
.dash-hero .hchip .hk{font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:#7A8278; margin-bottom:4px}
.dash-hero .hchip .hv{font-size:30px; font-weight:700; line-height:1}
.dash-hero .hchip .hv.pos{color:#4CAF82}
.dash-hero .hchip .hv.neg{color:#E07070}

/* ---------- top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:40; background:var(--hero-bg); color:#F2EFE6;
  display:flex; align-items:center; gap:18px; padding:14px 22px; border-bottom:2px solid var(--brass);
}
.brand{display:flex; align-items:baseline; gap:10px; margin-right:auto}
.brand .mark{font-family:"Source Sans 3",system-ui,sans-serif; font-weight:700; font-size:20px; letter-spacing:.2px}
.brand .mark em{color:var(--brass); font-style:normal}
.brand .sub{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#A7A69A}
.tb-btn{
  display:inline-flex; align-items:center; gap:7px; padding:8px 13px; border-radius:var(--radius);
  font-size:13px; font-weight:500; color:#EDEAE0; border:1px solid #2C3A36; background:#16221F;
}
.tb-btn:hover{border-color:var(--brass); color:#fff}
.tb-btn.primary{background:var(--brass); color:var(--on-brass); border-color:var(--brass); font-weight:600}
.tb-btn.primary:hover{background:var(--brass-deep)}
.tb-btn svg{width:15px;height:15px}

/* ---------- shell ---------- */
.wrap{max-width:1180px; margin:0 auto; padding:26px 22px 80px}

/* ---------- multiples históricos ---------- */
.mult-charts{display:grid; grid-template-columns:repeat(2,1fr); gap:14px}
.mchart{border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px 10px; background:var(--card-2)}
.mchart-h{display:flex; align-items:center; justify-content:space-between; gap:8px; font-family:"Source Sans 3",system-ui,sans-serif; font-weight:600; font-size:14px; margin-bottom:4px}
.mchart-f{font-size:11.5px; color:var(--muted); margin-top:6px}
.mchart-f b{color:var(--ink-soft)}
.vpill{font-size:10.5px; font-weight:600; padding:2px 9px; border-radius:100px; white-space:nowrap}
.vpill.big{font-size:12px; padding:4px 12px}
.linklike{background:none; border:none; color:var(--brass-deep); font-weight:600; cursor:pointer; padding:0; font-size:11px; text-decoration:underline}
.linklike:hover{color:var(--brass)}
.assess{margin-top:18px; background:var(--brass-tint); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px}
.assess-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; flex-wrap:wrap}
.assess-list{margin:0 0 12px; padding-left:18px; font-size:12.5px; color:var(--ink-soft); line-height:1.7}
.assess p{margin:9px 0; font-size:13px; color:var(--ink-soft); line-height:1.55}
.assess-disc{font-size:11.5px !important; color:var(--muted) !important; font-style:italic; margin-top:12px !important}
@media (max-width:680px){.mult-charts{grid-template-columns:1fr}}

/* ---------- tabs ---------- */
.tabs{display:flex; gap:2px; border-bottom:1px solid var(--line); margin-bottom:24px}
.tab{padding:12px 20px; font-weight:600; font-size:14px; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px; display:inline-flex; align-items:center; gap:8px}
.tab.active{color:var(--ink); border-bottom-color:var(--brass)}
.tab:hover{color:var(--ink)}
.tab .cnt{font-family:"Source Sans 3",system-ui,sans-serif; font-size:11px; background:var(--line-soft); color:var(--muted); padding:1px 7px; border-radius:100px}
.tab.active .cnt{background:var(--brass-tint); color:var(--brass-deep)}

/* ---------- intake (nueva valoración) ---------- */
.intake-lede{color:var(--muted); font-size:13.5px; max-width:60ch; margin:4px 0 0}
.note{display:flex; gap:11px; background:var(--blue-tint); border:1px solid #cdddea; border-radius:var(--radius); padding:13px 15px; margin:18px 0; font-size:12.5px; color:#2A4763; line-height:1.5}
.note svg{width:17px; height:17px; flex-shrink:0; margin-top:1px; color:var(--blue)}
.paste-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
.paste-box label{display:block; font-size:11px; letter-spacing:.04em; color:var(--muted); font-weight:600; margin-bottom:5px}
.paste-box label b{color:var(--ink-soft)}
.paste-box textarea{width:100%; min-height:120px; resize:vertical; padding:10px; border:1px solid var(--line); border-radius:var(--radius); background:var(--card-2); font-family:"Source Sans 3",system-ui,sans-serif; font-size:11px; line-height:1.4}
.paste-box textarea:focus{outline:2px solid var(--brass-tint); border-color:var(--brass); background:var(--card)}
.paste-box.ok textarea{border-color:var(--pos); background:var(--pos-tint)}
.actions-row{display:flex; gap:12px; align-items:center; margin-top:18px; flex-wrap:wrap}
.warn-list{background:var(--warn-tint); border:1px solid var(--line); border-radius:var(--radius); padding:12px 15px; font-size:12.5px; color:#6e5212; margin-top:4px}
.warn-list b{color:#54400d}
.warn-list ul{margin:6px 0 0; padding-left:18px}
.preview-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding:7px 0; border-bottom:1px dashed var(--line-soft)}
.preview-row:last-child{border-bottom:none}
.preview-row .pk{color:var(--ink-soft); font-size:13px}
.preview-row .pv{font-family:"Source Sans 3",system-ui,sans-serif; font-weight:500}
.preview-row.missing .pv{color:var(--neg)}
@media (max-width:760px){.paste-grid{grid-template-columns:1fr}}

/* ---------- dashboard ---------- */
.board-head{display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin-bottom:18px; flex-wrap:wrap}
.board-head h1{font-size:30px; line-height:1.05}
.board-head .lede{color:var(--muted); font-size:13.5px; max-width:46ch; margin-top:6px}
.chips{display:flex; gap:10px; flex-wrap:wrap}
.chip{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:9px 14px; min-width:92px}
.chip .k{font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted-2)}
.chip .v{font-family:"Source Sans 3",system-ui,sans-serif; font-size:21px; font-weight:600; line-height:1.1; margin-top:2px}

.toolbar{display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin:20px 0 14px}
.sort-wrap{display:flex; flex-direction:column; gap:4px}
.sort-label{font-size:10.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; padding-left:2px}
.ret-period{margin-top:14px; padding-top:12px; border-top:1px solid var(--line); font-size:11.5px; color:var(--muted); line-height:1.55}
.ret-period b{color:var(--ink); font-weight:700}
.jd-panel{border:1.5px solid var(--brass)}
.jd-panel .panel-h h2{color:var(--brass-deep)}
.jd-item{display:flex; gap:12px; padding:13px 0; border-bottom:1px solid var(--line)}
.jd-item:last-child{border-bottom:none}
.jd-dot{font-size:15px; line-height:1.35; flex-shrink:0; width:14px}
.jd-q{font-size:13px; font-weight:700; color:var(--ink); margin-bottom:4px}
.jd-t{font-size:12.5px; color:var(--muted); line-height:1.6}
.jd-t b{color:var(--ink); font-weight:700}
.jd-foot{margin-top:14px; padding:11px 13px; background:var(--card-2); border-radius:var(--radius); font-size:11.5px; color:var(--muted); line-height:1.55; border-left:3px solid var(--brass)}
.jd-ft{font-size:11px; font-weight:700; color:var(--ink); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px}
.jd-tbl{width:100%; border-collapse:collapse; font-size:11.5px}
.jd-tbl th{text-align:left; font-weight:700; color:var(--muted-2); font-size:10px; text-transform:uppercase; letter-spacing:.04em; padding:4px 10px 4px 0; border-bottom:1px solid var(--line)}
.jd-tbl td{padding:5px 10px 5px 0; color:var(--muted); font-variant-numeric:tabular-nums}
.jd-tbl td:first-child{font-weight:700; color:var(--ink)}
.jd-tbl td b{color:var(--pos)}
.jd-tbl td.jd-v{color:var(--pos); font-weight:700}
.jd-tbl td.jd-a{color:var(--entry); font-weight:700}
.jd-tbl td.jd-r{color:var(--neg); font-weight:700}
.jd-tag{font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; opacity:.85; margin-left:3px}
.search{flex:1; min-width:200px; position:relative}
.search input{width:100%; padding:9px 12px 9px 34px; border:1px solid var(--line); border-radius:var(--radius); background:var(--card)}
.search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--muted-2)}
.sel{padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius); background:var(--card); color:var(--ink)}
.sel:focus,.search input:focus{outline:2px solid var(--brass-tint); border-color:var(--brass)}

/* ---------- table ---------- */
.tablecard{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow)}
table.grid{width:100%; border-collapse:collapse}
.grid thead th{
  text-align:left; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
  font-weight:600; padding:12px 16px; border-bottom:1px solid var(--line); background:var(--card-2); white-space:nowrap;
}
.grid thead th.num,.grid td.num{text-align:right}
.grid tbody td{padding:14px 16px; border-bottom:1px solid var(--line-soft); vertical-align:middle}
.grid tbody tr:last-child td{border-bottom:none}
.grid tbody tr{cursor:pointer; transition:background .12s}
.grid tbody tr:hover{background:var(--hover)}
.co-name{font-family:"Source Sans 3",system-ui,sans-serif; font-size:16px; font-weight:600; line-height:1.1}
.co-tk{font-family:"Source Sans 3",system-ui,sans-serif; font-size:11px; color:var(--muted); letter-spacing:.04em; margin-top:1px}
.ret{font-family:"Source Sans 3",system-ui,sans-serif; font-weight:600; font-size:16px}
.ret.pos{color:var(--pos)} .ret.neg{color:var(--neg)}
.subnum{font-size:11.5px; color:var(--muted)}
.badge{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:100px; white-space:nowrap}
.badge::before{content:""; width:6px; height:6px; border-radius:50%; background:currentColor}
.badge.comprar{color:var(--pos); background:var(--pos-tint)}
.badge.potencial{color:var(--pos); background:var(--pos-tint)}
.badge.portafolio{color:var(--entry); background:var(--entry-bg); border:1px solid var(--entry)}
.port-tabs{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap}
.ptab{padding:8px 16px; font-size:13px; font-weight:600; color:var(--muted); background:var(--card); border:1px solid var(--line); border-radius:100px}
.ptab:hover{color:var(--ink-soft); border-color:var(--muted-2)}
.ptab.active{color:var(--on-brass); background:var(--brass); border-color:var(--brass)}
.field.entry label{color:var(--entry); font-weight:700}
.field.entry .unit input{border:1.6px solid var(--entry); background:var(--entry-bg); font-weight:700; color:var(--ink)}
.field.entry .unit input:focus{border-color:var(--entry); background:var(--entry-bg); outline:2px solid var(--entry)}
.field.entry .unit .u{color:var(--entry); font-weight:700}
.wc-zero{margin-top:16px; padding:12px 14px; border:1px solid var(--line); border-radius:var(--radius); background:var(--card-2)}
.guide-box{margin-top:16px; border:1px solid var(--line); border-radius:var(--radius); background:var(--card-2); overflow:hidden}
.rowacts{display:flex; gap:5px; align-items:center; justify-content:flex-end; white-space:nowrap}
.tikrbtn{font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; cursor:pointer;
  border:1px solid var(--brass); background:transparent; color:var(--brass); letter-spacing:.02em; font-family:inherit}
.tikrbtn:hover{background:var(--brass); color:var(--on-brass)}
.tikrbtn.on{background:var(--brass); color:var(--on-brass)}
.guide-box summary{cursor:pointer; padding:11px 14px; font-size:12.5px; font-weight:700; color:var(--brass-deep); display:flex; align-items:center; gap:8px; list-style:none}
.guide-box summary::-webkit-details-marker{display:none}
.guide-box summary:hover{background:var(--hover)}
.guide-body{padding:2px 14px 12px}
.guide-item{padding:9px 0; border-top:1px solid var(--line)}
.guide-k{font-size:11px; font-weight:700; color:var(--ink); text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px}
.guide-t{font-size:12px; color:var(--muted); line-height:1.55}
.guide-t b{color:var(--ink); font-weight:700}
.wc-zero label{display:flex; align-items:center; gap:9px; font-size:13px; font-weight:600; color:var(--ink); cursor:pointer}
.wc-zero label b{font-weight:700}
.wc-zero input[type=checkbox]{width:16px; height:16px; accent-color:var(--brass); cursor:pointer}

<script>
"use strict";
/* ============================================================
   ALMACENAMIENTO
   ============================================================ */
const KEY="pf_valoraciones_v1";
let state={companies:[], view:"dashboard", current:null, showFormulas:false, detailTab:"val", fundTab:"is",
           filter:{q:"",sector:"",estado:"",port:"",sort:"oldest"}};

function load(){
  const raw=localStorage.getItem(KEY);
  if(raw){ try{ state.companies=JSON.parse(raw); }catch(e){ state.companies=[]; } }
  else { state.companies=[]; save(); }
  const remap={"Cara - seguimiento":"Seguimiento - cara","con potencial":"Seguimiento - con potencial","En análisis":"En análisis","Seguimiento - cara":"Seguimiento - cara","Seguimiento - con potencial":"Seguimiento - con potencial"};
  const TIPOS_OK=["Tecnología","Industrial","Retail y consumo estable","Alto crecimiento","Otro"];
  const mapSector=s=>{ if(!s) return "Otro"; if(TIPOS_OK.includes(s)) return s;
    const t=String(s).toLowerCase();
    if(/tecn|tech|software|semic|internet|cloud/.test(t)) return "Tecnología";
    if(/industr|manufact|maquin|energ/.test(t)) return "Industrial";
    if(/retail|consumo|aliment|restaur|supermerc/.test(t)) return "Retail y consumo estable";
    return "Otro"; };
  state.companies.forEach(c=>{ c.estado=remap[c.estado]||"En análisis"; if(c.enPortafolio!=="Sí") c.enPortafolio="No";
    c.sector=mapSector(c.sector); if(c.tipoNegocio){ if(TIPOS_OK.includes(c.tipoNegocio)) c.sector=c.tipoNegocio; delete c.tipoNegocio; }
    if(c.base && c.base.minority==null && c.stmts && c.stmts.is){
      try{ const f=computeFundamentals(c); if(f&&f.rows.length){ const lm=f.rows[f.rows.length-1].minority; c.base.minority=(lm!=null&&isFinite(lm))?lm:0; } }catch(e){}
    }
    if(c.base && c.stmts && c.stmts.is){
      try{ const f=computeFundamentals(c); if(f&&f.rows.length){ const lr=f.rows[f.rows.length-1];
        if(lr.da!=null&&isFinite(lr.da)) c.base.da=Math.round(lr.da);        // D&A total (incluye amortización de intangibles)
        if(lr.netInt!=null&&isFinite(lr.netInt)) c.base.netInt=Math.round(lr.netInt); // interés neto base para el ratio de minoritarios
      } }catch(e){}
    }
    if(c.niCalc==null && c.stmts && c.stmts.is){ try{ c.niCalc=computeNiCalc(c)||undefined; }catch(e){} }
  });
}
function applyTheme(t){ if(t==="dark") document.documentElement.setAttribute("data-theme","dark"); else document.documentElement.removeAttribute("data-theme"); }
/* Nombre del analista · se guarda solo en este navegador (por persona) */
function getAnalyst(){ try{ return localStorage.getItem("pf_analyst")||""; }catch(e){ return ""; } }
function setAnalyst(v){ try{ localStorage.setItem("pf_analyst", v); }catch(e){} }
function toggleTheme(){ const next=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"; try{localStorage.setItem("pf_theme",next);}catch(e){} applyTheme(next); }
applyTheme((function(){ try{return localStorage.getItem("pf_theme");}catch(e){return null;} })()||"light");
function save(){ localStorage.setItem(KEY, JSON.stringify(state.companies)); }
function uid(){ return "v"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
/* Momento de creación: usa createdAt si existe; si no, lo deduce del id (que lleva el timestamp) */
function createdTs(c){
  if(c.createdAt&&isFinite(c.createdAt)) return c.createdAt;
  const m=/^v([a-z0-9]+)/i.exec(c.id||"");
  if(m){ const t=parseInt(m[1].slice(0,8),36); if(isFinite(t)&&t>1e12) return t; }
  return 0;
}

/* ============================================================
   MOTOR DE VALORACIÓN  (réplica de la plantilla MSFT.xlsx)
   ============================================================ */
function project(c){
  const n=5, b=c.base;
  const r={years:[],sales:[],ebit:[],da:[],ebitda:[],netInt:[],ebt:[],tax:[],ni:[],
           shares:[],wc:[],dwc:[],capex:[],fcf:[],netDebt:[],minority:[],
           pEVFCF:[],pPE:[],pEVEBITDA:[],pEVEBIT:[],pAVG:[]};
  let pSales=b.sales, pDA=b.da, pShares=b.shares, pWC=(b.wc===""||b.wc==null)?b.sales*c.wcPct[0]:b.wc;
  // Intereses minoritarios: se proyectan como % del beneficio CONSOLIDADO (EBIT+interés, después de impuestos), como la plantilla
  const consolBaseNI=(b.ebit!=null)? (b.ebit+(b.netInt||0))*(1-(c.taxRate[0]||0)) : ((b.ni||0)-(b.minority||0));
  const minRatio=(b.minority&&consolBaseNI)? b.minority/consolBaseNI : 0;
  const nc=c.niCalc||null;
  let cashPrev=nc?nc.cashBase:0, debtPrev=nc?nc.debtBase:0, ndPrev=b.netDebt, mktPrev=nc?nc.mktBase:0, salesPrevNi=b.sales, debtFloor=nc?nc.debtBase:0;
  for(let i=0;i<n;i++){
    r.years[i]=(c.baseYear+i+1)+"e";
    const s=pSales*(1+c.growth[i]); r.sales[i]=s;
    const e=s*c.ebitMargin[i]; r.ebit[i]=e;
    const d=pDA*(1+c.growth[i]); r.da[i]=d;
    r.ebitda[i]=e+d;
    const nd=r.ebitda[i]*c.ndEbitda[i]; r.netDebt[i]=nd;
    // Interés neto automático (deuda/caja proyectada). Con deuda neta: igual que la plantilla.
    // Con CAJA NETA: la deuda bruta se mantiene (no se infla) y la caja crece → el interés mejora (económicamente correcto).
    let ni_;
    if(nc){
      let cash_i, debt_i, mkt_i;
      const sr = salesPrevNi ? s/salesPrevNi : 1;
      if(nd>0){
        if(i===0 || ndPrev<=0){ cash_i=nc.minCashSales*s; debt_i=nd+cash_i; mkt_i=(nc.cashBase?nc.mktBase/nc.cashBase:0)*cash_i; }
        else { const k=Math.abs(nd)/(Math.abs(ndPrev)||1); cash_i=cashPrev*k; debt_i=debtPrev*k; mkt_i=mktPrev*sr; }
        debtFloor=debt_i;
      } else {
        debt_i=debtFloor; cash_i=debtFloor-nd; mkt_i=(i===0)?nc.mktBase:mktPrev*sr;
      }
      ni_=-nc.rDebt*debt_i+nc.rCash*mkt_i;
      cashPrev=cash_i; debtPrev=debt_i; mktPrev=mkt_i;
    } else {
      ni_=(c.netInt&&c.netInt[i]!=null&&c.netInt[i]!=="")?Number(c.netInt[i]):s*(c.netIntPct[i]||0);
    }
    r.netInt[i]=ni_; ndPrev=nd; salesPrevNi=s;
    const ebt=e+ni_; r.ebt[i]=ebt;
    const t=ebt*c.taxRate[i]; r.tax[i]=t;
    r.ni[i]=ebt-t;
    const sh=pShares*(1+c.shareChg[i]); r.shares[i]=sh;
    const wc=s*c.wcPct[i]; r.wc[i]=wc;
    const dwc=(i===0 && c.wcPct[0]===0)?0:(wc-pWC); r.dwc[i]=dwc;
    const cap=s*c.capexPct[i]; r.capex[i]=cap;
    const minAdd = minRatio*r.ni[i]; r.minority[i]=minAdd;
    r.fcf[i]=r.ebitda[i]-cap+ni_-t-dwc+minAdd;
    // precios objetivo por método
    r.pEVFCF[i]=(r.fcf[i]*c.mult.evfcf - nd)/sh;
    r.pPE[i]=(nd<0 ? (r.ni[i]*c.mult.pe - nd) : (r.ni[i]*c.mult.pe))/sh;
    r.pEVEBITDA[i]=(r.ebitda[i]*c.mult.evebitda - nd)/sh;
    r.pEVEBIT[i]=(r.ebit[i]*c.mult.evebit - nd)/sh;
    r.pAVG[i]=(r.pPE[i]+r.pEVEBITDA[i]+r.pEVEBIT[i])/3; // EV/FCF excluido (igual que la plantilla)
    pSales=s; pDA=d; pShares=sh; pWC=wc;
  }
  return r;
}
function annualized(target, price, years){
  if(!price||price<=0||!isFinite(target)||target<=0) return null;
  return Math.pow(target/price, 1/years)-1;
}
function summary(c){
  const r=project(c);
  const h=Math.min(Math.max(c.horizon||5,1),5);
  const i=h-1;
  const px=c.base.price;
  const pxCalc = (c.fxEnabled && c.fxIn) ? px*c.fxIn : px;
  // Años usados para anualizar:
  //  - "fiscal" (por defecto): h años completos desde el año base (convención de la mesa)
  //  - "hoy": años reales desde hoy hasta el cierre del año objetivo
  const targetYear=c.baseYear+h;
  let yrs=h;
  if(c.retFromToday){
    const end=new Date(targetYear,11,31), now=new Date();
    const diff=(end-now)/(365.25*24*3600*1000);
    yrs=Math.max(diff,0.08);
  }
  return {
    proj:r, h, idx:i, price:px, pxCalc, yrs, targetYear,
    targetAvg:r.pAVG[i],
    retAvg:annualized(r.pAVG[i],pxCalc,yrs),
    retEVFCF:annualized(r.pEVFCF[i],pxCalc,yrs),
    retPE:annualized(r.pPE[i],pxCalc,yrs),
    retEVEBITDA:annualized(r.pEVEBITDA[i],pxCalc,yrs),
    retEVEBIT:annualized(r.pEVEBIT[i],pxCalc,yrs),
    upside:(pxCalc>0? r.pAVG[i]/pxCalc-1 : null)
  };
}
/* Conversión de divisa: objetivo (moneda financieros) → moneda de cotización */
function fxDisp(c, usd){ return (usd==null||!isFinite(usd)||!c.fxEnabled||c.fxOut==null)? usd : usd*c.fxOut; }
function chosenReturn(s, metric){
  metric=metric||"avg";
  return ({avg:s.retAvg, evfcf:s.retEVFCF, pe:s.retPE, evebitda:s.retEVEBITDA, evebit:s.retEVEBIT})[metric];
}
function chosenTarget(s, metric){
  metric=metric||"avg"; const r=s.proj, i=s.idx;
  return ({avg:r.pAVG[i], evfcf:r.pEVFCF[i], pe:r.pPE[i], evebitda:r.pEVEBITDA[i], evebit:r.pEVEBIT[i]})[metric];
}
function metricLabel(metric){ return ({avg:"Promedio", evfcf:"EV/FCF", pe:"P/E", evebitda:"EV/EBITDA", evebit:"EV/EBIT"})[metric||"avg"]; }
function chosenUpside(s, metric){ const t=chosenTarget(s,metric); return (s.pxCalc>0&&t!=null)? t/s.pxCalc-1 : null; }

function filtered(){
  let l=state.companies.slice();
  const f=state.filter, q=f.q.trim().toLowerCase();
  if(q) l=l.filter(c=>(c.name+" "+c.ticker).toLowerCase().includes(q));
  if(f.sector) l=l.filter(c=>c.sector===f.sector);
  if(f.estado) l=l.filter(c=>c.estado===f.estado);
  if(f.port==="in") l=l.filter(c=>c.enPortafolio==="Sí");
  else if(f.port==="out") l=l.filter(c=>c.enPortafolio!=="Sí");
  if(f.port==="in"){
    l.sort((a,b)=>{ const pa=+a.pesoPortafolio||0, pb=+b.pesoPortafolio||0;
      if(pb!==pa) return pb-pa;
      const ra=chosenReturn(summary(a),a.retMetric), rb=chosenReturn(summary(b),b.retMetric);
      return (rb==null?-Infinity:rb)-(ra==null?-Infinity:ra); });
  } else if(f.sort==="name"){ l.sort((a,b)=>(a.name||"").localeCompare(b.name||"")); }
  else if(f.sort==="recent"){ l.sort((a,b)=>createdTs(b)-createdTs(a)); }
  else if(f.sort==="oldest"){ l.sort((a,b)=>createdTs(a)-createdTs(b)); }
  else { l.sort((a,b)=>{ const ra=chosenReturn(summary(a),a.retMetric), rb=chosenReturn(summary(b),b.retMetric);
      const va=ra==null?-Infinity:ra, vb=rb==null?-Infinity:rb;
      return f.sort==="ret_asc"? va-vb : vb-va; }); }
  return l;
}

/* helpers de render del detalle */
function cls(v){ return v==null?"":(v>=0?"pos":"neg"); }
function num(v){ return (v==null||!isFinite(v))?"—":nf2.format(v); }
function fInput(label,k,val,type){ return `<div class="field"><label>${label}</label><input data-k="${k}" type="${type}" value="${esc(String(val??""))}"></div>`; }
function bInput(label,k,val,hint){ return `<div class="field"><label>${label}</label><input class="mono" data-bk="${k}" type="number" step="any" value="${val===""?"":esc(String(val))}">${hint?`<span class="hint">${hint}</span>`:""}</div>`; }
function multInput(label,k,val,med){ return `<div class="field"><label>${label}</label><div class="unit"><input class="mono" data-mk="${k}" type="number" step="any" value="${val}"><span class="u">x</span></div>${med!=null&&isFinite(med)?`<span class="hint">mediana hist. <b>${nf1.format(med)}x</b> · <button class="linklike" data-usemed="${k}" data-med="${med.toFixed(2)}">usar</button></span>`:`<span class="hint">pega los múltiplos de TIKR arriba</span>`}</div>`; }
function medOf(c,k){ if(!c.histMult)return null; const s=multStats(c.histMult.ltm[k],c.histMult.currentLast); return s?s.median:null; }
function mRow(c,label,k,kind){
  const cells=c[k].map((v,i)=>{
    const disp = kind==="pct" ? round(v*100,3) : v;
    return `<td><input class="mono" data-ak="${k}" data-i="${i}" data-kind="${kind}" type="number" step="any" value="${disp}"></td>`;
  }).join("");
  const canTikr=["growth","ebitMargin","taxRate","ndEbitda"].includes(k) && estHasRow(c,k);
  const isTikr=c.estRows&&c.estRows[k];
  const tikrBtn = canTikr
    ? `<button class="tikrbtn ${isTikr?"on":""}" onclick="applyEstRow('${c.id}','${k}')" title="Rellenar esta partida con las proyecciones de TIKR">${isTikr?"✓ TIKR":"usar TIKR"}</button>`
    : "";
  return `<tr><td class="rowlab">${label}${kind==="pct"?' <span style="color:var(--muted-2);font-size:11px">%</span>':kind==="m"?' <span style="color:var(--muted-2);font-size:11px">M</span>':' <span style="color:var(--muted-2);font-size:11px">x</span>'}</td>${cells}<td class="rowacts">${tikrBtn}<button class="fillbtn" data-fill="${k}">= a todos</button></td></tr>`;
}
function pRow(c,label,k,formula,arr,base){
  const cells=arr.map(v=>`<td class="val">${fM(v)}</td>`).join("");
  const baseCell=`<td class="val">${base==null?"—":fM(base)}</td>`;
  const main=`<tr><td class="rl">${label}</td>${baseCell}${cells}</tr>`;
  const f=state.showFormulas?`<tr class="formula-row"><td colspan="7"><span class="formula">${formula}</span></td></tr>`:"";
  return main+f;

  const [ca0,ca1]=firstLast(r=>r.cash); const dCash=(ca0&&ca1!=null)?ca1/ca0-1:null;
  push('bs','¿La caja sube o baja?',

  const [wc0,wc1]=firstLast(r=>r.wc); const wcRange=wcs.length?Math.max(...wcs)-Math.min(...wcs):0;
  const signFlip=(wc0!=null&&wc1!=null)&&((wc0<0&&wc1>0)||(wc0>0&&wc1<0));
  push('cf','Variación del working capital',

    wc1==null?'Sin datos.':
    wcRange>0.08?`Cambio drástico en el working capital (de ${money(wc0)} a ${money(wc1)}, un giro de ${fPct(wcRange)} sobre ventas). Revisar por qué, sea variación positiva o negativa.`:
    signFlip?`El working capital cambió de signo de forma moderada (de ${money(wc0)} a ${money(wc1)}).`:
    `Working capital consistente con su histórico (~${fPct((last.rev?wc1/last.rev:0))} de ventas).`);
  const gF=cagr(ser(r=>r.fcf));
  let fcfDriver='';
  if(last.unearned&&last.rev&&last.unearned/last.rev>0.05) fcfDriver=' Los ingresos diferidos (cobra por adelantado) aportan caja y potencian el FCF.';
  else if(last.inv!=null&&last.rev&&last.inv/last.rev<0.02) fcfDriver=' Al no tener inventarios relevantes, es un negocio ligero que convierte muy bien en caja.';
  else if(wc1!=null&&wc1<0) fcfDriver=' Su working capital negativo (cobra antes de pagar) le aporta caja.';
  push('cf','FCF (owner earnings) y su tendencia',
    gF==null?'g': gF>0.05?'v': gF>-0.05?'a':'r',
    gF==null?'Sin datos.':
    gF>0.05?`El FCF es creciente (${fPct(gF)} anual): ${money(last.fcf)} el último año.`+fcfDriver:
    gF>-0.05?`El FCF no crece de forma clara (${fPct(gF)} anual). Revisar qué partida lo frena (capex, impuestos o working capital).`:

  const rowHtml=it=>{ const L=LV[it.lvl]; return `<div class="diag-item">
    <div class="diag-dot" style="color:${L.c}">${L.dot}</div>
    <div class="diag-body"><div class="diag-q">${it.q} <span class="diag-lvl" style="color:${L.c};border-color:${L.c}">${L.lab}</span></div>
    <div class="diag-txt">${it.txt}</div></div></div>`; };
  const group=st=>`<div class="panel"><div class="panel-h"><h2>${groupTitle[st]}</h2></div><div class="panel-b" style="padding-top:6px">${items.filter(i=>i.stmt===st).map(rowHtml).join("")}</div></div>`;
  const VL=LV[vlvl];
  return `<div class="diag-verdict" style="border-color:${VL.c}"><div class="diag-vh"><span style="color:${VL.c};font-size:20px">${VL.dot}</span> <b>Veredicto general</b></div><div class="diag-vtxt">${verdict}</div>
    <div class="diag-legend"><span style="color:#0F7A3D">●● Excelente</span><span style="color:#1F9254">● Bien</span><span style="color:#B26B00">● Atención / Verificar</span><span style="color:#C0392B">● Revisar</span><span style="color:#7A8087">● Informativo</span></div></div>
    ${group('is')}${group('bs')}${group('cf')}`;
}
function logoUrl(c){
  const s=(c.logo||"").trim(); if(!s) return "";
  if(/^https?:\/\//i.test(s)) return s;
  const dom=s.replace(/^www\./i,"").replace(/\/.*$/,"").trim().toLowerCase();
  // dominio válido: algo.algo (sin espacios), p. ej. visa.com
  return /^[a-z0-9-]+(\.[a-z0-9-]+)+$/.test(dom) ? `https://logo.clearbit.com/${dom}` : "";
}
/* ===== ¿Qué te diría Juanda? — lectura de la valoración según los criterios de la sesión ===== */
const JD_RANGOS={
  "Tecnología":{
    norm:{evfcf:[25,35], pe:[25,35], evebitda:[20,30], evebit:[18,25]},
    opt:{evfcf:25, pe:25, evebitda:20, evebit:18}
  },
  "Industrial":{
    norm:{evfcf:[10,20], pe:[10,20], evebitda:[9,13], evebit:[10,14]},
    opt:{evfcf:15, pe:15, evebitda:10, evebit:12}
  },
  "Retail y consumo estable":{
    norm:{evfcf:[15,30], pe:[15,30], evebitda:[10,14], evebit:[12,16]},
    opt:{evfcf:16, pe:16, evebitda:10, evebit:12}
  },
  "Alto crecimiento":{ norm:null, opt:null,
    nota:"<b>Alto crecimiento:</b> aquí es donde se cometen los mayores errores. Un múltiplo bajo puede ser un espejismo si el EPS proyectado asume un crecimiento enorme que puede no cumplirse. Sin rango de referencia: usa un estándar de su industria y proyecta con crecimiento razonable."
  },
  "Otro":{ norm:null, opt:null,
    nota:"<b>Sector no identificado dentro de los rangos:</b> como no tenemos un rango de referencia para este tipo de negocio, la referencia debe ser su <b>propia mediana histórica</b>."
  }
};
const JD_MULT_LAB={evfcf:"EV/FCF", pe:"P/E", evebitda:"EV/EBITDA", evebit:"EV/EBIT"};

/* Tabla de rangos de referencia por tipo de negocio (reutilizable) */
function jdRangosHTML(c){
  const tipo=c.sector||"Otro";
  const RG=JD_RANGOS[tipo]||JD_RANGOS["Otro"];
  const X=v=>(v==null||!isFinite(v))?"—":nf1.format(v)+"x";
  if(!RG.norm) return `<div class="jd-foot">${RG.nota}</div>`;
  const KL=["evfcf","pe","evebitda","evebit"];
  const rows=KL.map(k=>{
    const v=c.mult[k], nr=RG.norm[k], op=RG.opt[k];
    let cls="", tag="";
    if(v!=null&&isFinite(v)){
      if(v>nr[1]){ cls="jd-r"; tag="fuera de rango"; }
      else if(v>op){ cls="jd-a"; tag="sobre el óptimo"; }
      else { cls="jd-v"; tag="óptimo ✓"; }
    }
    return `<tr><td>${JD_MULT_LAB[k]}</td><td>${nr[0]}–${nr[1]}x</td><td><b>${op}x o menos</b></td>
      <td class="${cls}">${X(v)}${tag?` <span class="jd-tag">${tag}</span>`:""}</td></tr>`;
  }).join("");
  return `<div class="jd-foot"><div class="jd-ft">Rangos de referencia · ${esc(tipo)}</div>
    <table class="jd-tbl"><thead><tr><th>Múltiplo</th><th>Normal al que cotizan</th><th>Óptimo para comprar</th><th>Tu múltiplo de salida</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function renderJuanda(c){
  const s=summary(c), r=s.proj, metric=c.retMetric||"avg";
  const tipo=c.sector||"Otro", calidad=c.calidadNegocio||"Estándar";
  const RG=JD_RANGOS[tipo]||JD_RANGOS["Otro"];
  const f=(c.stmts&&c.stmts.is)?computeFundamentals(c):null;
  const rows=f?f.rows:[];
  const P=v=>v==null?"—":fPct(v);
  const X=v=>(v==null||!isFinite(v))?"—":nf1.format(v)+"x";
  const items=[];
  const push=(lvl,t,txt)=>items.push({lvl,t,txt});

  // --- 1. Múltiplo de cotización actual vs mediana histórica ---
  const medPE=medOf(c,"pe"), medSel=medOf(c,metric);
  const multSalida=c.mult[metric==="avg"?"pe":metric];
  const st=c.histMult?multStats(c.histMult.ltm.pe, c.histMult.currentLast):null;
  const peHoy=st?st.current:null;
  if(peHoy!=null&&medPE!=null){
    const ratio=peHoy/medPE;
    if(ratio<0.85) push("v","¿A qué múltiplo cotiza hoy?",`Cotiza a <b>${X(peHoy)}</b> de P/E frente a una mediana histórica de <b>${X(medPE)}</b>: está <b>por debajo de su calificación habitual</b>. Recuerda que el precio puede estar en máximos y aun así el múltiplo ser atractivo: lo que importa es el múltiplo, no el precio.`);
    else if(ratio>1.20) push("a","¿A qué múltiplo cotiza hoy?",`Cotiza a <b>${X(peHoy)}</b> de P/E frente a su mediana de <b>${X(medPE)}</b>: el mercado le está dando una <b>calificación exigente</b>. Aunque el negocio sea espectacular, comprar a un múltiplo alto puede hacerte perder dinero.`);
    else push("v","¿A qué múltiplo cotiza hoy?",`Cotiza a <b>${X(peHoy)}</b> de P/E, en línea con su mediana histórica de <b>${X(medPE)}</b>. Calificación razonable.`);
  } else {
    push("g","¿A qué múltiplo cotiza hoy?",`Pega la tabla <b>Valuation</b> de TIKR para ver a qué múltiplo cotiza hoy y compararlo con su mediana. Sin eso no puedes saber si está cara o barata — el precio solo no te lo dice.`);
  }

  // --- 2. LA TRAMPA: múltiplo bajo con indicador que cae (caso ATKR) ---
  if(rows.length>=3){
    const epsSer=rows.map(x=>x.eps).filter(x=>x!=null&&isFinite(x));
    // Tendencia real del EPS: media de los 3 últimos vs media de los 3 anteriores (evita falsos positivos por un bache puntual)
    const n=epsSer.length;
    const avgOf=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
    const rec=avgOf(epsSer.slice(-3)), prev=avgOf(epsSer.slice(-6,-3));
    const epsCae = (rec!=null&&prev!=null&&prev>0) ? (rec/prev-1) < -0.05 : false;   // cae solo si la tendencia baja >5%
    const g5=(()=>{const v=epsSer.slice(-5); if(v.length<2)return null; const a=v[0],b=v[v.length-1]; return (a>0&&b>0)?Math.pow(b/a,1/(v.length-1))-1:null;})();
    if(peHoy!=null&&medPE!=null&&peHoy<medPE*0.9&&epsCae){
      push("r","⚠ Cuidado con la trampa del múltiplo",`El múltiplo se ve bajo (<b>${X(peHoy)}</b>), pero <b>el beneficio por acción viene cayendo</b> como tendencia. Ojo con esta trampa: si el precio baja pero el EPS baja más, el múltiplo termina <b>subiendo</b>. Puede estar <b>más cara siendo peor negocio</b>. Antes de ver esto como oportunidad, entiende por qué se deteriora el indicador.`);
    } else if(epsCae){
      push("a","Evolución del indicador (EPS)",`El beneficio por acción <b>viene cayendo</b> como tendencia. Recuerda: el precio sigue al EPS a largo plazo. Los negocios que no van bien se venden — revisa si es un bache o un deterioro estructural.`);
    } else {
      push("v","Evolución del indicador (EPS)",`El beneficio por acción <b>crece</b>${g5!=null?` (${P(g5)} anual en 5 años)`:""}. Esa es la base: si el múltiplo se mantiene estable y el EPS crece, <b>el precio sube solo</b>.`);
    }
  }

  // --- 3. ¿Los múltiplos de salida aplicados son razonables? ---
  const KEYS=["evfcf","pe","evebitda","evebit"];
  if(RG.norm){
    const fuera=[], sobreOpt=[], ok=[];
    KEYS.forEach(k=>{
      const v=c.mult[k], nr=RG.norm[k], op=RG.opt[k];
      if(v==null||!isFinite(v)) return;
      if(v>nr[1]) fuera.push(`${JD_MULT_LAB[k]} <b>${X(v)}</b> (normal ${nr[0]}–${nr[1]}x)`);
      else if(v>op) sobreOpt.push(`${JD_MULT_LAB[k]} <b>${X(v)}</b> (óptimo ≤${op}x)`);
      else ok.push(`${JD_MULT_LAB[k]} <b>${X(v)}</b>`);
    });
    let t="", lv="v";
    if(fuera.length){ lv="r"; t=`Hay múltiplos de salida <b>por encima del rango normal</b> de ${tipo.toLowerCase()}: ${fuera.join(" · ")}. Es una valoración exigente: si el mercado no paga ese múltiplo, pierdes dinero aunque el negocio sea bueno.`; }
    else if(sobreOpt.length){ lv="a"; t=`Los múltiplos están dentro del rango normal, pero <b>por encima del óptimo de compra</b>: ${sobreOpt.join(" · ")}. Examina si el negocio justifica pagar por encima de lo óptimo.`; }
    else { lv="v"; t=`Los múltiplos de salida están <b>dentro de lo óptimo</b> para ${tipo.toLowerCase()}: ${ok.join(" · ")}. Valoración prudente.`; }
    if(sobreOpt.length&&!fuera.length&&ok.length) t+=` En rango óptimo: ${ok.join(" · ")}.`;
    // contraste con la mediana del múltiplo elegido en la mesa
    if(medSel!=null&&multSalida!=null){
      if(multSalida>medSel*1.1) t+=` Además, el múltiplo con el que calculas el retorno (${metricLabel(metric)} ${X(multSalida)}) está <b>por encima de su mediana histórica</b> (${X(medSel)}): estás asumiendo un re-rating que puede no llegar.`;
      else t+=` El múltiplo con el que calculas el retorno (${metricLabel(metric)} ${X(multSalida)}) está <b>en o por debajo de su mediana</b> (${X(medSel)}): así se valora siendo pesimista.`;
    }
    push(lv,"¿Los múltiplos de salida son razonables?",t);
  } else {
    const lista=KEYS.filter(k=>c.mult[k]!=null&&isFinite(c.mult[k])).map(k=>`${JD_MULT_LAB[k]} <b>${X(c.mult[k])}</b>`).join(" · ");
    let t=`${RG.nota} Aplicas: ${lista}.`;
    if(medSel!=null&&multSalida!=null){
      t += multSalida>medSel*1.1
        ? ` El múltiplo con el que calculas el retorno (${metricLabel(metric)} ${X(multSalida)}) está <b>por encima de su mediana histórica</b> (${X(medSel)}): examina si hay una razón de peso para pagar ese premium.`
        : ` El múltiplo con el que calculas el retorno (${metricLabel(metric)} ${X(multSalida)}) está <b>en o por debajo de su mediana</b> (${X(medSel)}), que es la referencia prudente.`;
    } else {
      t+=` Pega la tabla <b>Valuation</b> de TIKR para tener la mediana como referencia.`;
    }
    push(tipo==="Alto crecimiento"?"a":"g","¿Los múltiplos de salida son razonables?",t);
  }
  if(calidad==="Superior"){
    push("g","Negocio superior",`Marcaste este negocio como <b>superior</b>. En los negocios superiores la referencia es <b>la mediana o por debajo</b>: no hace falta estirar el múltiplo para que la tesis funcione.`);
  }

  // --- 4. ¿Estás proyectando pesimista? (vs consenso TIKR) ---
  if(c.stmts&&c.stmts.est&&c.stmts.est.trim()){
    try{
      const pre=JSON.parse(JSON.stringify(c));
      const res=applyAnalystEstimates(pre);
      if(res&&res.ok){
        const gT=pre.growth, mT=pre.ebitMargin;
        const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
        const gMio=avg(c.growth), gCons=avg(gT), mMio=avg(c.ebitMargin), mCons=avg(mT);
        const gDif=gMio-gCons, mDif=mMio-mCons;
        if(gDif>0.01||mDif>0.01){
          push("a","¿Estás valorando de forma pesimista?",`Tus supuestos van <b>por encima del consenso</b> de analistas (crecimiento ${P(gMio)} vs ${P(gCons)}; margen ${P(mMio)} vs ${P(mCons)}). La idea es <b>castigar</b> las proyecciones, no mejorarlas: si el retorno solo aparece siendo optimista, no hay margen de seguridad.`);
        } else if(gDif<-0.005||mDif<-0.005){
          push("v","¿Estás valorando de forma pesimista?",`Estás <b>castigando el consenso</b> (crecimiento ${P(gMio)} vs ${P(gCons)}; margen ${P(mMio)} vs ${P(mCons)}). Así se valora: pesimista. Si aun así hay retorno, la tesis es sólida.`);
        } else {
          push("v","¿Estás valorando de forma pesimista?",`Tus supuestos van <b>en línea con el consenso</b>. Examina castigarlos un poco más para tener margen de seguridad.`);
        }
      }
    }catch(e){}
  } else {
    push("g","¿Estás valorando de forma pesimista?",`Pega las <b>estimaciones de analistas</b> de TIKR (en Supuestos) y podré decirte si estás castigando el consenso o si vas por encima de él.`);
  }

  // --- 5. El retorno: ¿es interesante? ---
  const ret=chosenReturn(s,metric);
  if(ret!=null){
    if(ret>=0.15) push("v","¿El retorno es interesante?",`Con tus supuestos, el retorno anualizado es de <b>${P(ret)}</b> (${metricLabel(metric)}). Por encima del <b>15%</b> que se maneja como referencia — si además los riesgos evaluados no son de gran preocupación, es de las oportunidades que valen la pena examinar en serio.`);
    else if(ret>=0.08) push("a","¿El retorno es interesante?",`El retorno anualizado es de <b>${P(ret)}</b> (${metricLabel(metric)}), <b>por debajo del 15%</b> de referencia. Examina si compensa frente a otras opciones que tengas en la mesa.`);
    else if(ret>=0) push("a","¿El retorno es interesante?",`El retorno anualizado es de solo <b>${P(ret)}</b>. Con este potencial, la empresa <b>no está barata</b> a estos precios y supuestos.`);
    else push("r","¿El retorno es interesante?",`El retorno anualizado es <b>negativo (${P(ret)})</b>: con estos supuestos y este múltiplo, estás pagando <b>más de lo que vale</b>. Aquí es donde el precio engaña — el múltiplo te lo está diciendo.`);
  }

  // --- 6. Si ya está en portafolio: ¿vender, mantener, sumar? ---
  if(c.enPortafolio==="Sí"&&peHoy!=null&&medPE!=null){
    const caro=peHoy>medPE*1.2;
    const es=rows.map(x=>x.eps).filter(x=>x!=null&&isFinite(x));
    const av=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
    const rec=av(es.slice(-3)), prv=av(es.slice(-6,-3));
    const epsCrece=(rec!=null&&prv!=null&&prv>0)? (rec/prv-1) > -0.05 : true;
    if(!caro&&epsCrece&&ret!=null&&ret>=0.15){
      push("v","Ya la tienes en portafolio","El múltiplo <b>sigue siendo razonable</b> y el negocio mejora. Que estés ganando rentabilidad <b>no es motivo para vender</b> — puede ser motivo para comprar más. En los negocios top hay que tolerar las subidas: el dinero grande no se hace comprando ni vendiendo, sino esperando.");
    } else if(caro&&epsCrece){
      push("a","Ya la tienes en portafolio","El múltiplo está <b>exigente</b> pero el negocio sigue mejorando: puede estar dándose una revaluación de múltiplo, y esta puede sostenerse en el tiempo. Aquí no hay que salir corriendo: examina <b>ventas parciales</b> dejando una base con la que te sientas cómodo, y deja que la posición siga generando caja.");
    } else if(caro&&!epsCrece){
      push("r","Ya la tienes en portafolio","Múltiplo <b>exigente</b> y el indicador <b>no acompaña</b>. Aquí sí se cumplen los criterios para examinar una salida: sé optimista al proyectar y, si aun así el retorno es moderado frente a otras opciones, la tesis se agotó.");
    } else {
      push("a","Ya la tienes en portafolio","Múltiplo contenido pero el indicador no acompaña. Los negocios que no van bien se venden: revisa si el deterioro es estructural. Mantener perdedoras y cortar ganadoras es lo peor que puede hacer un inversionista.");
    }
  }

  // --- Render ---
  const LV={v:{c:'#1F9254',dot:'●'},a:{c:'#B26B00',dot:'●'},r:{c:'#C0392B',dot:'●'},g:{c:'#7A8087',dot:'●'}};
  const body=items.map(it=>{const L=LV[it.lvl];return `<div class="jd-item"><div class="jd-dot" style="color:${L.c}">${L.dot}</div>
    <div><div class="jd-q">${it.t}</div><div class="jd-t">${it.txt}</div></div></div>`;}).join("");
  const foot=(!RG.norm)?`<div class="jd-foot">${RG.nota}</div>`:"";
  return `<div class="panel jd-panel">
    <div class="panel-h"><h2>¿Qué te diría Juanda?</h2>
      <p>Lectura de esta valoración según los criterios de la mesa: <b>precio = múltiplo × indicador</b>. Lo que importa no es el precio, sino el múltiplo y hacia dónde va el negocio.</p></div>
    <div class="panel-b">${body}
      ${foot}
    </div>
  </div>`;
}

      ${tr("Razón corriente (AC / PC)","currentRatio",xr)}
      ${tr("Activos totales","totAssets",money,"grp")}
      ${tr("Pasivos totales","totLiab",money)}
      ${tr("Activos / Pasivos totales","assetsToLiab",xr)}`);
    charts=chartsWrap(`

      ${fchart("Deuda total","Deuda bruta (corto + largo plazo)", fBars(rows,"debt",M({color:"#B23A2E",name:"Deuda total"})))}

      ${fchart("Razón corriente","Activos corrientes / Pasivos corrientes (liquidez)", fLines([{label:"Razón corriente",color:"var(--blue)",data:rows.map(r=>r.currentRatio)}],yrs,{fmt:xr,lab:v=>nf1.format(v)+"x"}))}
      ${fchart("Activos / Pasivos totales","Cobertura total (solvencia)", fLines([{label:"Activos/Pasivos",color:"#1F7A52",data:rows.map(r=>r.assetsToLiab)}],yrs,{fmt:xr,lab:v=>nf1.format(v)+"x"}))}`);
  }

  const kpi=(k,v)=>`<div class="fkpi"><div class="fk">${k}</div><div class="fv">${v}</div></div>`;
  const kpis=`<div class="fund-kpis">
    ${kpi("Ingresos "+last.y, fmtMoney(last.rev))}
    ${kpi("Margen EBIT", last.ebitMargin!=null?fPct(last.ebitMargin):"—")}
    ${kpi("Margen neto", last.netMargin!=null?fPct(last.netMargin):"—")}
    ${kpi("Margen FCF", last.fcfMargin!=null?fPct(last.fcfMargin):"—")}
    ${kpi("ROIC", last.roic!=null?fPct(last.roic):"—")}
    ${kpi("Deuda neta", last.netDebt!=null?fmtMoney(last.netDebt):"—")}
  </div>`;
  const T=state.fundTab||"is";
  const stabs=`<div class="ftabs">
    <button class="ftab ${T==='is'?'active':''}" onclick="setFundTab('is')">Ingresos y beneficio neto</button>
    <button class="ftab ${T==='cf'?'active':''}" onclick="setFundTab('cf')">Cash Flow</button>
    <button class="ftab ${T==='ratios'?'active':''}" onclick="setFundTab('ratios')">Ratios y endeudamiento</button>
    <button class="ftab ${T==='cap'?'active':''}" onclick="setFundTab('cap')">Despliegue de capital</button>
  </div>`;
  return `<div class="panel"><div class="panel-h"><h2><span class="eyebrow">Fundamentales</span> ${esc(c.name)} · histórico ${yrs[0]}–${yrs[yrs.length-1]}</h2>
      <span style="font-size:11.5px;color:var(--muted)">${rows.length} años · datos de TIKR</span></div>
    <div class="panel-b">${kpis}</div></div>
    ${stabs}

    ${charts}`;
}
function multStats(arr,currentLast){
  if(!arr||!arr.length) return null;
  const current=arr[arr.length-1];
  const hist=arr.slice(); // la mediana incluye TODOS los años, igual que la plantilla (MEDIAN de toda la fila)
  const pos=hist.filter(x=>x!=null&&isFinite(x)&&x>0&&x<1000);
  if(!pos.length) return {current, median:null};
  const med=median(pos);
  const below=(current!=null&&isFinite(current)&&current>0)? pos.filter(x=>x<current).length/pos.length : null;
  return {current, median:med, min:Math.min(...pos), max:Math.max(...pos),
          discount:(current!=null&&isFinite(current)&&current>0&&med)? current/med-1:null, pctile:below};
}
const MCOLORS={evfcf:"#2E5A86", pe:"#9A6B1E", evebitda:"#1F7A52", evebit:"#7A5BA6"};
function multSpark(arr,years,currentLast,color){
  const W=320,H=124,padL=10,padR=64,padT=14,padB=18;
  const pts=arr.map((v,i)=>({y:v,i})).filter(p=>p.y!=null&&isFinite(p.y)&&p.y>0&&p.y<1000);
  if(pts.length<2) return `<div style="font-size:12px;color:var(--muted);padding:24px 10px">Sin datos suficientes para graficar.</div>`;
  const ys=pts.map(p=>p.y); let ymin=Math.min(...ys),ymax=Math.max(...ys); if(ymin===ymax){ymin*=0.9;ymax*=1.1;}
  const pad=(ymax-ymin)*0.12; ymin-=pad; ymax+=pad;
  const xN=Math.max(arr.length-1,1);
  const X=i=>padL+(i/xN)*(W-padL-padR);
  const Y=v=>padT+(1-(v-ymin)/(ymax-ymin))*(H-padT-padB);
  const st=multStats(arr,currentLast), med=st&&st.median;
  const path=pts.map((p,k)=>(k?"L":"M")+X(p.i).toFixed(1)+","+Y(p.y).toFixed(1)).join(" ");
  const lastIdxA=arr.length-1;
  const circles=pts.map(p=>`<circle cx="${X(p.i).toFixed(1)}" cy="${Y(p.y).toFixed(1)}" r="${p.i===lastIdxA?4:2.4}" fill="${p.i===lastIdxA?'var(--brass)':color}" stroke="#fff" stroke-width="${p.i===lastIdxA?1.2:0.6}"><title>${years[p.i]}: ${nf1.format(p.y)}x</title></circle>`).join("");
  const medLine=(med!=null&&med>=ymin&&med<=ymax)?`<line x1="${padL}" y1="${Y(med).toFixed(1)}" x2="${W-padR}" y2="${Y(med).toFixed(1)}" stroke="var(--muted-2)" stroke-dasharray="3 3" stroke-width="1"/><text x="${(W-padR+4)}" y="${(Y(med)+3).toFixed(1)}" font-size="9.5" fill="var(--muted)">med ${nf1.format(med)}x</text>`:"";
  const cur=pts[pts.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="overflow:visible">
    ${medLine}
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.9" stroke-linejoin="round"/>
    ${circles}
    <text x="${X(cur.i).toFixed(1)}" y="${(Y(cur.y)-8).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="600" fill="var(--brass-deep)">${nf1.format(cur.y)}x</text>
    <text x="${padL}" y="${H-4}" font-size="9" fill="var(--muted-2)">${years[pts[0].i]}</text>
    <text x="${(W-padR)}" y="${H-4}" text-anchor="end" font-size="9" fill="var(--muted-2)">${years[lastIdxA]}</text>
  </svg>`;
}
function renderHistPanel(c){
  const h=c.histMult; const sm=c.stmts||{};
  const box=(id,lab,val)=>`<div class="paste-box ${val?'ok':''}"><label><b>${lab}</b></label><textarea id="${id}" style="width:100%;min-height:96px;resize:vertical;padding:9px;border:1px solid var(--line);border-radius:4px;background:var(--card-2);font-family:'Source Sans 3',system-ui,sans-serif;font-size:10.5px">${esc(val||"")}</textarea></div>`;
  const paste=`<details ${h?"":"open"} style="margin-top:${h?"14px":"0"}"><summary style="cursor:pointer;font-size:12.5px;color:var(--brass-deep);font-weight:600">${h?"Actualizar / volver a pegar los estados de TIKR":"Pegar los estados financieros de TIKR"}</summary>
    <div class="note" style="margin-top:12px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
      <span>Cuando revalúes la empresa (p. ej. con los estados de un nuevo año), pega aquí las tablas actualizadas de TIKR y pulsa <b>Actualizar valoración</b>. Refresca el <b>año base, los datos base, los múltiplos históricos y las estimaciones</b> de una vez, manteniendo tu precio de entrada, tesis y ajustes. <b>Importante:</b> que la pestaña <b>Valuation empiece el mismo año</b> que el Income Statement.</span></div>
    <div class="paste-grid" style="grid-template-columns:repeat(2,1fr);margin-top:12px">
      ${box("st_is","Income Statement",sm.is)}
      ${box("st_bs","Balance Sheet",sm.bs)}
      ${box("st_cf","Cash Flow",sm.cf)}
      ${box("st_val","Valuation (múltiplos)",sm.val)}
      ${box("st_est","Estimaciones de analistas (opcional)",sm.est)}
    </div>
    <button class="tb-btn primary" id="btnHist" style="background:var(--brass);color:var(--on-brass);margin-top:10px">${h?"Actualizar valoración":"Calcular múltiplos"}</button>
  </details>`;

  if(!h){
    return `<div class="panel"><div class="panel-h"><h2><span class="eyebrow">04</span> Múltiplos históricos</h2>
      <span style="font-size:11.5px;color:var(--muted)">Múltiplos históricos · contrasta antes de elegir los de salida</span></div>
      <div class="panel-b">${paste}</div></div>`;
  }
  const defs=[["EV / FCF","evfcf"],["P / E","pe"],["EV / EBITDA","evebitda"],["EV / EBIT","evebit"]];
  const charts=defs.map(([lab,k])=>{
    const arr=h.ltm[k]; const st=arr?multStats(arr,h.currentLast):null;
    if(!arr||!st) return `<div class="mchart"><div class="mchart-h">${lab}</div><div style="font-size:12px;color:var(--muted);padding:20px 8px">No se pudo calcular.</div></div>`;
    const cur=st&&st.current, med=st&&st.median;
    const disc=st&&st.discount;
    const tag = disc==null?`<span class="vpill" style="color:var(--muted);background:var(--line-soft)">s/d</span>`
      : disc<-0.12?`<span class="vpill" style="color:var(--pos);background:var(--pos-tint)">${fPct(disc)} · barata</span>`
      : disc>0.12?`<span class="vpill" style="color:var(--neg);background:var(--neg-tint)">+${fPct(disc)} · cara</span>`
      : `<span class="vpill" style="color:var(--warn);background:var(--warn-tint)">${fPct(disc)} · en línea</span>`;
    return `<div class="mchart"><div class="mchart-h"><span>${lab}</span>${tag}</div>
      ${multSpark(arr,h.years,h.currentLast,MCOLORS[k])}
      <div class="mchart-f">actual <b>${cur!=null&&isFinite(cur)?nf1.format(cur)+"x":"NM"}</b> · mediana ${med!=null?nf1.format(med)+"x":"—"} · rango ${st&&st.min!=null?nf1.format(st.min)+"–"+nf1.format(st.max)+"x":"—"}</div></div>`;
  }).join("");

  return `<div class="panel"><div class="panel-h"><h2><span class="eyebrow">04</span> Múltiplos históricos</h2>
      <span style="font-size:11.5px;color:var(--muted)">${h.years[0]}–${h.years[h.years.length-1]} · punto naranja = forward 2026e (a precio de entrada)</span></div>
    <div class="panel-b">
      <div class="mult-charts">${charts}</div>
      <p style="font-size:11.5px;color:var(--muted);margin:12px 0 0;line-height:1.5">Múltiplos <b>forward</b>: cada año histórico usa sus fundamentales y el <b>precio del año siguiente</b>. El punto naranja es el <b>forward 2026e</b> = precio de entrada aplicado a <b>tu proyección</b> del próximo año (no al consenso de TIKR). <b>EBITDA = Operating Income + D&A</b> (GAAP), <b>FCF owner earnings</b> (capex de mantenimiento ≈ D&A) y <b>EV = precio × acciones + deuda neta</b>.</p>
      ${paste}
    </div></div>`;
}
function assessmentHtml(c){
  const h=c.histMult; if(!h) return "";
  const S=k=>multStats(h.ltm[k],h.currentLast);
  const core=["pe","evebitda","evebit"].map(k=>{const s=S(k); return s&&s.discount;}).filter(x=>x!=null&&isFinite(x));
  if(!core.length) return "";
  const avg=core.reduce((a,b)=>a+b,0)/core.length;
  const verdict=avg<-0.12?"barata":avg>0.12?"cara":"en línea";
  const vColor=avg<-0.12?"var(--pos)":avg>0.12?"var(--neg)":"var(--warn)";
  const vBg=avg<-0.12?"var(--pos-tint)":avg>0.12?"var(--neg-tint)":"var(--warn-tint)";
  // lectura: forward vs media histórica (crecimiento) + contraste con consenso NTM
  const peFwd=(S("pe")||{}).current, peMed=(S("pe")||{}).median, peCons=h.ntm&&h.ntm.pe;
  let growth="";
  if(peFwd&&peMed&&isFinite(peFwd)&&isFinite(peMed)){
    growth = (peFwd<peMed)
      ? `El múltiplo <b>forward</b> (lo que pagas hoy por la proyección del próximo año) está por debajo de su media histórica forward: el mercado paga <b>menos por los beneficios esperados</b> que en su promedio, señal de que descuenta crecimiento o tiene dudas sobre él.`
      : `El múltiplo <b>forward</b> está por encima de su media histórica forward: pagas una <b>prima</b> sobre lo que la empresa ha valido de media mirando al próximo año.`;
    if(peCons&&isFinite(peCons)) growth += ` De contraste, el P/E forward de consenso (NTM de TIKR) es ${nf1.format(peCons)}x frente a ${nf1.format(peFwd)}x con tu proyección — ${Math.abs(peCons/peFwd-1)<0.12?"bien alineados":"con divergencia: conviene revisar tus supuestos"}.`;
  }
  const why = avg<-0.12
    ? `Cotiza por debajo de su media histórica. Los motivos típicos: el mercado descuenta <b>menor crecimiento futuro</b>, <b>presión en márgenes</b>, o un <b>ciclo de capex elevado</b> que deprime el flujo de caja (clásico en empresas invirtiendo fuerte en IA/infraestructura), o un castigo por <b>sentimiento/regulación</b>. Antes de asumir que está barata, confirma cuál de estos aplica: una empresa puede estar "barata" con razón.`
    : avg>0.12
    ? `Cotiza con prima sobre su media histórica. Suele reflejar <b>expectativas de aceleración</b>, <b>mejora de márgenes</b> o una <b>prima de calidad/escasez</b>. El riesgo es de re-rating a la baja: cualquier decepción comprime el múltiplo.`
    : `Cotiza cerca de su media histórica: el mercado la valora en línea con su propio pasado. El retorno dependerá sobre todo del <b>crecimiento del negocio</b>, no de una expansión del múltiplo.`;
  const sugg = avg<-0.12
    ? `Para los múltiplos de salida, la <b>mediana histórica</b> es un ancla razonable (no asume re-rating). Si la tesis es que el castigo es temporal, podrías acercarte a la mediana; si crees que el mercado tiene razón, quédate por debajo.`
    : avg>0.12
    ? `Sé prudente: usar el múltiplo <b>actual</b> como salida asume que la prima se mantiene 5 años. La <b>mediana histórica</b> es más conservadora y suele ser mejor ancla.`
    : `La <b>mediana histórica</b> es buena ancla de salida. Evita proyectar una expansión de múltiplo que tendrías que justificar.`;
  const lines=[["P/E","pe"],["EV/EBITDA","evebitda"],["EV/EBIT","evebit"],["EV/FCF","evfcf"]].map(([n,k])=>{
    const s=S(k); if(!s||s.median==null) return "";
    const cur=s.current, d=s.discount;
    const verd=d==null?"s/d":d<-0.12?"barata":d>0.12?"cara":"en línea";
    return `<li><b>${n}</b>: actual ${cur!=null&&isFinite(cur)&&cur>0?nf1.format(cur)+"x":"NM"} vs mediana ${nf1.format(s.median)}x ${d!=null?`→ ${d<0?"":"+"}${fPct(d)} (${verd})`:""}</li>`;
  }).filter(Boolean).join("");
  return `<div class="assess">
    <div class="assess-head"><span class="eyebrow" style="color:var(--brass-deep)">Lectura</span>
      <span class="vpill big" style="color:${vColor};background:${vBg}">En conjunto: ${verdict} (${avg<0?"":"+"}${fPct(avg)} vs medianas)</span></div>
    <ul class="assess-list">${lines}</ul>
    ${growth?`<p>${growth}</p>`:""}
    <p><b>¿Qué la tiene cotizando así?</b> ${why}</p>
    <p><b>Cómo aplicar los múltiplos de salida.</b> ${sugg}</p>
    <p class="assess-disc">Es una lectura de los números (medianas frente al múltiplo actual), no una recomendación de inversión. Contrasta las hipótesis con el negocio antes de decidir.</p>
  </div>`;
}

function bindDetail(c){
  // campos identidad/texto
  app.querySelectorAll("[data-k]").forEach(el=>{
    const k=el.dataset.k;
    el.addEventListener(el.tagName==="SELECT"?"change":"input",()=>{
      let v=el.value;
      if(el.type==="number") v=v===""?"":Number(v);
      c[k]=v; save();
      if(k==="enPortafolio"){ renderDetail(); return; }
      if(k==="estado"){ // re-render badge
        app.querySelector(".detail-title .badge").outerHTML=statusBadge(c);
      }
      if(k==="name") app.querySelector(".detail-title .nm").textContent=v||"Sin nombre";
      if(k==="baseYear"){ recompute(c); }
    });
  });
  // datos base
  app.querySelectorAll("[data-bk]").forEach(el=>{
    el.addEventListener("input",()=>{
      const k=el.dataset.bk; c.base[k]= el.value===""?(k==="wc"?"":0):Number(el.value); save(); recompute(c);
    });
  });
  // múltiplos
  app.querySelectorAll("[data-mk]").forEach(el=>{
    el.addEventListener("input",()=>{ c.mult[el.dataset.mk]=Number(el.value)||0; c.multFromMedian=false; save(); recompute(c); });
  });
  // supuestos
  app.querySelectorAll("[data-ak]").forEach(el=>{
    el.addEventListener("input",()=>{
      const k=el.dataset.ak, i=+el.dataset.i, kind=el.dataset.kind;
      let v=Number(el.value); if(isNaN(v))v=0;
      c[k][i]= kind==="pct"? v/100 : v; save(); recompute(c);
    });
  });
  // "= a todos"
  app.querySelectorAll("[data-fill]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const k=btn.dataset.fill; const v0=c[k][0];
      c[k]=c[k].map(()=>v0); save(); renderDetail();
    });
  });
  // múltiplos históricos: pegar texto (4 estados)
  ["st_is","st_bs","st_cf","st_val","st_est"].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener("input",()=>{ c.stmts=c.stmts||{}; c.stmts[id.slice(3)]=el.value; save(); }); });
  // calcular múltiplos (modo plantilla)
  const bh=document.getElementById("btnHist");
  if(bh) bh.addEventListener("click",()=>{
    const g=id=>(document.getElementById(id)||{}).value||"";
    const stmts={is:g("st_is"),bs:g("st_bs"),cf:g("st_cf"),val:g("st_val"),est:g("st_est")};
    if(!stmts.is||!stmts.bs||!stmts.cf){ toast("Pega al menos Income Statement, Balance Sheet y Cash Flow"); return; }
    c.stmts={...c.stmts, ...stmts};
    // refrescar año base y datos base desde los nuevos estados (mantiene precio, tesis y ajustes)
    try{ const fu=computeFundamentals(c); if(fu&&fu.rows.length){ const lr=fu.rows[fu.rows.length-1];
      if(lr.y!=null) c.baseYear=lr.y;
      if(lr.rev!=null) c.base.sales=Math.round(lr.rev);
      if(lr.ebit!=null) c.base.ebit=Math.round(lr.ebit);
      if(lr.da!=null) c.base.da=Math.round(lr.da);
      if(lr.ni!=null) c.base.ni=Math.round(lr.ni);
      if(lr.netDebt!=null) c.base.netDebt=Math.round(lr.netDebt);
      if(lr.wc!=null) c.base.wc=Math.round(lr.wc);
      if(lr.shares!=null) c.base.shares=lr.shares;
      c.base.minority=Math.round(lr.minority||0);
      if(lr.netInt!=null) c.base.netInt=Math.round(lr.netInt);
      if(lr.fcf!=null) c.base.fcf=Math.round(lr.fcf);
    } }catch(e){}
    // múltiplos históricos (si se pegó Valuation)
    if((stmts.val||"").trim()){
      const hm=computeTemplateMultiples(c.stmts, c);
      if(hm){
        c.histMult=hm;
        // si los múltiplos venían de la mediana (no los tocaste a mano), se refrescan con la nueva mediana
        if(c.multFromMedian){
          ["evfcf","pe","evebitda","evebit"].forEach(k=>{ const m=medOf(c,k); if(m!=null&&isFinite(m)&&m>0) c.mult[k]=round(m,1); });
        }
      } else toast("Revisa la tabla Valuation");
    }
    try{ c.niCalc=computeNiCalc(c)||undefined; }catch(e){}
    // estimaciones de analistas (si se pegaron)
    if((stmts.est||"").trim()){ try{ applyAnalystEstimates(c); }catch(e){} }
    save(); renderDetail();
    toast("Valoración actualizada");
  });
  // conversión de divisa
  const fxE=document.getElementById("fxEnabled");
  if(fxE) fxE.addEventListener("change",()=>{ c.fxEnabled=fxE.checked; if(c.fxEnabled&&c.finCurrency==null)c.finCurrency="USD"; save(); renderDetail(); });
  const fxI=document.getElementById("fxIn");
  if(fxI) fxI.addEventListener("change",()=>{ c.fxIn=fxI.value===""?null:Number(fxI.value); save(); renderDetail(); });
  const fxO=document.getElementById("fxOut");
  if(fxO) fxO.addEventListener("change",()=>{ c.fxOut=fxO.value===""?null:Number(fxO.value); save(); renderDetail(); });
  const fxC=document.getElementById("finCur");
  if(fxC) fxC.addEventListener("change",()=>{ c.finCurrency=(fxC.value||"USD").toUpperCase(); save(); renderDetail(); });
  // "Sin inventarios": poner WC/Ventas en 0
  const wz=document.getElementById("wcZero");
  if(wz) wz.addEventListener("change",()=>{
    if(wz.checked){ c._wcPrev=c.wcPct.slice(); c.wcPct=[0,0,0,0,0]; c.wcZero=true; }
    else { if(c._wcPrev) c.wcPct=c._wcPrev.slice(); c.wcZero=false; }
    save(); renderDetail();
  });
  // estimaciones de analistas
  const ep=document.getElementById("estPaste");
  if(ep) ep.addEventListener("input",()=>{ c.stmts=c.stmts||{}; c.stmts.est=ep.value; save(); });
  const be=document.getElementById("btnEst");
  if(be) be.addEventListener("click",()=>{
    c.stmts=c.stmts||{}; c.stmts.est=(document.getElementById("estPaste")||{}).value||"";
    const res=applyAnalystEstimates(c);
    if(!res.ok){ toast(res.msg); return; }
    save(); renderDetail();
    toast(`Estimaciones aplicadas (${res.applied.growth} años crecim., ${res.applied.margin} margen, ${res.applied.tax} tax, ${res.applied.nd} deuda/EBITDA)`);
  });
  const bec=document.getElementById("btnEstClear");
  if(bec) bec.addEventListener("click",()=>{
    if(c._preEst){ c.growth=c._preEst.growth.slice(); c.ebitMargin=c._preEst.ebitMargin.slice(); c.taxRate=c._preEst.taxRate.slice(); c.ndEbitda=c._preEst.ndEbitda.slice(); delete c._preEst; }
    c.estApplied=false; save(); renderDetail(); toast("Revertido a criterio histórico");
  });
  // usar mediana como múltiplo de salida
  app.querySelectorAll("[data-usemed]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const k=btn.dataset.usemed, med=Number(btn.dataset.med);
      c.mult[k]=med; save();
      const inp=app.querySelector(`[data-mk="${k}"]`); if(inp) inp.value=med;
      recompute(c); toast("Aplicada la mediana de "+k.toUpperCase());
    });
  });
  // horizonte
  const hz=document.getElementById("horizon");
  if(hz) hz.addEventListener("change",()=>{ c.horizon=+hz.value; save(); recompute(c); });
  // múltiplo que impulsa el retorno de la mesa
  const rm=document.getElementById("retMetric");
  if(rm) rm.addEventListener("change",()=>{ c.retMetric=rm.value; save(); renderDetail(); });
  // base temporal para anualizar el retorno
  const rf=document.getElementById("retFrom");
  if(rf) rf.addEventListener("change",()=>{ c.retFromToday=(rf.value==="today"); save(); renderDetail(); });
  // toggle fórmulas
  const tg=document.getElementById("tgFormulas");
  if(tg) tg.addEventListener("change",()=>{ state.showFormulas=tg.checked; renderDetail(); });
}
// recompute = re-render solo lo que depende del cálculo (retornos + tabla proyección)
function recompute(c){
  const s=summary(c), r=s.proj, idx=s.idx;
  // retornos
  const setBig=(sel,val,extra)=>{ const e=app.querySelector(sel); if(e){ e.className="big "+cls(val); e.textContent=fPct(val);} };
  const cards=app.querySelectorAll(".returns .retcard");
  if(cards.length){
    cards[0].querySelector(".big").className="big "+cls(s.retAvg); cards[0].querySelector(".big").textContent=fPct(s.retAvg);
    cards[0].querySelector(".px").textContent=`Objetivo ${s.targetAvg!=null&&isFinite(s.targetAvg)?nf2.format(s.targetAvg):"—"} ${c.currency} · precio ${nf2.format(s.price)}`;
    const rest=[["retEVFCF",r.pEVFCF],["retPE",r.pPE],["retEVEBITDA",r.pEVEBITDA],["retEVEBIT",r.pEVEBIT]];
    rest.forEach((pair,i)=>{ const card=cards[i+1]; if(!card)return;
      card.querySelector(".big").className="big "+cls(s[pair[0]]); card.querySelector(".big").textContent=fPct(s[pair[0]]);
      card.querySelector(".px").textContent="obj. "+num(pair[1][idx]); });
  }
  // tabla proyección: re-render del cuerpo
  renderProjBody(c,r);
  // tabla de precios objetivo (nuevo formato)
  const tw=app.querySelector("#tgtWrap"); if(tw) tw.innerHTML=targetTableHTML(c);
}
function renderProjBody(c,r){
  const tbody=app.querySelector(".proj tbody"); if(!tbody)return;
  tbody.innerHTML=
    pRow(c,"Ventas","sales","Ventasₜ = Ventasₜ₋₁ × (1 + Crecimiento)",r.sales,c.base.sales)+
    pRow(c,"EBIT","ebit","EBITₜ = Ventasₜ × Margen EBIT",r.ebit,c.base.ebit)+
    pRow(c,"D&A","da","D&Aₜ = D&Aₜ₋₁ × (1 + Crecimiento)",r.da,c.base.da)+
    pRow(c,"EBITDA","ebitda","EBITDAₜ = EBITₜ + D&Aₜ",r.ebitda,c.base.ebit+c.base.da)+
    pRow(c,"Impuestos","tax","Impuestosₜ = EBITₜ × Tax rate",r.tax,null)+
    pRow(c,"Beneficio neto","ni","Bº netoₜ = EBITₜ − Impuestos",r.ni,c.base.ni)+
    pRow(c,"Acciones","shares","Accionesₜ = Accionesₜ₋₁ × (1 + Δ acciones)",r.shares,c.base.shares)+
    pRow(c,"Working capital","wc","WCₜ = Ventasₜ × (WC / Ventas)",r.wc,c.base.wc===""?null:c.base.wc)+
    pRow(c,"Δ Working capital","dwc","ΔWCₜ = WCₜ − WCₜ₋₁",r.dwc,null)+
    pRow(c,"CapEx mantenim.","capex","CapExₜ = Ventasₜ × (CapEx / Ventas)",r.capex,null)+
    pRow(c,"Free Cash Flow","fcf","FCFₜ = EBITDA − CapEx mant. − Impuestos − ΔWC",r.fcf,c.base.fcf)+
