/* ---------- LECTOR DE TIKR (réplica de los VLOOKUP de la plantilla) ---------- */
function normLabel(s){ return String(s??"").toLowerCase().replace(/\u00a0/g," ").replace(/[\s]+/g," ").trim(); }
function parseNum(s){
  if(s==null) return null;
  s=String(s).replace(/\u00a0/g," ").trim();
  if(s===""||s==="-"||s==="—"||/^n\.?\/?a$/i.test(s)||/^nm$/i.test(s)) return null;
  let neg=false;
  if(/^\(.*\)$/.test(s)){ neg=true; s=s.slice(1,-1); }
  if(/^-/.test(s)) neg=true;
  s=s.replace(/[^0-9.,]/g,"");
  if(s==="") return null;
  const lc=s.lastIndexOf(","), ld=s.lastIndexOf(".");
  let dec=-1;
  if(lc>-1&&ld>-1){ dec=Math.max(lc,ld); }
  else if(lc>-1){ const after=s.length-lc-1; if(s.indexOf(",")===lc&&after>0&&after<=2) dec=lc; }
  else if(ld>-1){ const after=s.length-ld-1; if(s.indexOf(".")===ld&&after>0&&after<=2) dec=ld; }
  let n;
  if(dec>-1){ n=parseFloat(s.slice(0,dec).replace(/[.,]/g,"")+"."+s.slice(dec+1).replace(/[.,]/g,"")); }
  else { n=parseFloat(s.replace(/[.,]/g,"")); }
  if(!isFinite(n)) return null;
  return neg?-n:n;
}
function parseTable(text){
  const lines=String(text||"").replace(/\r/g,"").split("\n").filter(l=>l.trim()!=="");
  const rows=[]; let years=null;
  for(const line of lines){
    let cells=line.split("\t");
    if(cells.length<2) cells=line.split(/ {2,}|;/); // fallback si no hay tabs
    cells=cells.map(c=>c.replace(/\u00a0/g," ").trim());
    if(cells.length<2) continue;
    if(!years){
      const yrs=cells.slice(1).map(c=>parseYearTok(c));
      if(yrs.filter(Boolean).length>=2) years=yrs;
    }
    rows.push({label:cells[0], vals:cells.slice(1).map(parseNum)});
  }
  return {years, rows};
}
function look(t,keys,mode){ const m=mode||"start"; for(const k of keys.map(normLabel)){ for(const r of t.rows){ const l=normLabel(r.label); if(m==="contains"? l.includes(k) : l.startsWith(k)) return r; } } return null; }
function lastIdx(r){ if(!r)return -1; for(let i=r.vals.length-1;i>=0;i--){ if(r.vals[i]!=null&&isFinite(r.vals[i])) return i; } return -1; }
function lastVal(r){ const i=lastIdx(r); return i<0?null:r.vals[i]; }
function median(a){ a=(a||[]).filter(x=>x!=null&&isFinite(x)); if(!a.length)return null; a=a.slice().sort((x,y)=>x-y); const m=Math.floor(a.length/2); return a.length%2?a[m]:(a[m-1]+a[m])/2; }
function last3(a){ return (a||[]).filter(x=>x!=null&&isFinite(x)).slice(-3); }
function yoy(a){ const o=[]; for(let i=1;i<a.length;i++){ const p=a[i-1],c=a[i]; if(p!=null&&c!=null&&isFinite(p)&&isFinite(c)&&p!==0) o.push((c-p)/Math.abs(p)); } return o; }
function ratio(num,den){ const o=[]; const n=Math.min(num.length,den.length); for(let i=0;i<n;i++){ if(num[i]!=null&&den[i]!=null&&den[i]!==0) o.push(num[i]/den[i]); } return o; }

/* Rellena crecimiento, margen EBIT, tax y deuda/EBITDA con estimaciones de analistas de TIKR */
function applyAnalystEstimates(c, only){
  const est=c.stmts&&c.stmts.est;
  if(!est||!est.trim()) return {ok:false,msg:"Pega primero la tabla de estimaciones de TIKR."};
  const T=parseTable(est);
  if(!T||!T.years||T.years.filter(x=>x!=null).length<1) return {ok:false,msg:"No pude leer los años de la tabla. Revisa que las columnas muestren los años."};
  const val=(keys,exact)=>{ for(const k of keys){ const r=exact?lookEx(T,k):look(T,[k]); if(r) return r.vals; } return null; };
  const rev=val(["Total Revenues","Revenues","Revenue"]);
  const ebitA=val(["Operating Income","EBIT"]);
  const ebitdaA=val(["EBITDA"]);
  const ebitMgA=val(["% EBIT Margins","% EBIT Margin","EBIT Margin %","% Operating Margin","Operating Margin %"]);
  const niA=val(["Net Income to Company","Net Income","Earnings"]);
  const ebtA=val(["Earnings before Taxes","Earnings Before Taxes","Pretax Income","EBT"]);
  const trateA=val(["Effective Tax Rate","Tax Rate"]);
  const ndA=val(["Net Debt","Total Net Debt"]);
  const mYear={}; T.years.forEach((y,i)=>{ if(y!=null&&mYear[y]==null)mYear[y]=i; });
  const at=(a,idx)=>(a&&idx!=null&&a[idx]!=null&&isFinite(a[idx]))?a[idx]:null;
  const g=c.growth.slice(), m=c.ebitMargin.slice(), tx=c.taxRate.slice(), ne=c.ndEbitda.slice();
  const applied={growth:0,margin:0,tax:0,nd:0}; let prevRev=c.base.sales, any=false;
  for(let i=0;i<5;i++){
    const idx=mYear[c.baseYear+1+i];
    const rv=at(rev,idx), eb=at(ebitA,idx), ed=at(ebitdaA,idx);
    if(rv!=null&&prevRev){ g[i]=rv/prevRev-1; applied.growth++; any=true; }
    // Margen EBIT: usa la fila de % que trae TIKR si existe; si no, lo calcula (EBIT / Ventas)
    let mg=at(ebitMgA,idx);
    if(mg!=null&&Math.abs(mg)>1) mg=mg/100;
    if(mg!=null&&isFinite(mg)){ m[i]=mg; applied.margin++; any=true; }
    else if(eb!=null&&rv){ m[i]=eb/rv; applied.margin++; any=true; }
    let tr=at(trateA,idx); if(tr!=null&&Math.abs(tr)>1) tr=tr/100;
    if(tr==null){ const niv=at(niA,idx), ebtv=at(ebtA,idx)!=null?at(ebtA,idx):eb; if(niv!=null&&ebtv&&ebtv!==0) tr=1-niv/ebtv; }
    if(tr!=null&&isFinite(tr)){ tx[i]=Math.min(Math.max(tr,0),0.5); applied.tax++; any=true; }
    if(at(ndA,idx)!=null&&ed&&ed!==0){ ne[i]=at(ndA,idx)/ed; applied.nd++; any=true; }
    if(rv!=null) prevRev=rv;
  }
  if(!any) return {ok:false,msg:"No encontré filas usables (Revenues, EBIT, EBITDA, Net Debt) para los años proyectados."};
  if(!c._preEst) c._preEst={growth:c.growth.slice(),ebitMargin:c.ebitMargin.slice(),taxRate:c.taxRate.slice(),ndEbitda:c.ndEbitda.slice()};
  if(only){
    const map={growth:[g,"growth"], ebitMargin:[m,"margin"], taxRate:[tx,"tax"], ndEbitda:[ne,"nd"]};
    const e=map[only]; if(!e) return {ok:false,msg:"Partida no disponible."};
    if(!applied[e[1]]) return {ok:false,msg:"TIKR no trae datos de esta partida para los años proyectados."};
    c[only]=e[0];
    c.estRows=c.estRows||{}; c.estRows[only]=true;
    return {ok:true, applied:{[e[1]]:applied[e[1]]}, only};
  }
  c.growth=g; c.ebitMargin=m; c.taxRate=tx; c.ndEbitda=ne; c.estApplied=true;
  c.estRows={growth:!!applied.growth, ebitMargin:!!applied.margin, taxRate:!!applied.tax, ndEbitda:!!applied.nd};
  return {ok:true, applied};
}
/* ¿TIKR trae datos para esta partida? (para habilitar el botón por fila) */
function estHasRow(c, key){
  if(!c.stmts||!c.stmts.est||!c.stmts.est.trim()) return false;
  try{
    const T=parseTable(c.stmts.est); if(!T||!T.years) return false;
    const has=(keys)=>{ for(const k of keys){ if(look(T,[k])) return true; } return false; };
    if(key==="growth") return has(["Total Revenues","Revenues","Revenue"]);
    if(key==="ebitMargin") return has(["% EBIT Margins","% EBIT Margin","EBIT Margin %","Operating Income","EBIT"]);
    if(key==="taxRate") return has(["Effective Tax Rate","Tax Rate","Earnings before Taxes","Net Income"]);
    if(key==="ndEbitda") return has(["Net Debt","Total Net Debt"]);
  }catch(e){}
  return false;
}
function applyEstRow(id, key){
  const c=state.companies.find(x=>x.id===id); if(!c) return;
  const r=applyAnalystEstimates(c, key);
  if(!r.ok){ toast(r.msg||"No pude aplicar TIKR a esta partida"); return; }
  save(); renderDetail();
  toast("Partida rellenada con las proyecciones de TIKR");
}
function runExtract(){
  const d=state.draft;
  if(!d.is.trim()||!d.bs.trim()||!d.cf.trim()){ toast("Pega los tres estados financieros"); return; }
  const IS=parseTable(d.is), BS=parseTable(d.bs), CF=parseTable(d.cf);
  const warn=[];
  const need=(r,name)=>{ if(r==null||lastVal(r)==null) warn.push(name); return r; };

  const salesR=need(look(IS,["Total Revenues","Revenue","Revenues"]),"Ventas (Total Revenues)");
  const ebitR =need(look(IS,["Operating Income"]),"EBIT (Operating Income)");
  const sharesR=need(look(IS,["diluted shares outstanding","weighted average diluted shares","diluted weighted average shares"],"contains"),"Acciones (Weighted Average Diluted Shares Outstanding)");
  const taxR  =look(IS,["Income Tax Expense"]);
  const niR   =look(IS,["Net Income to Company","Net Income"]);
  const minR  =look(IS,["Minority Interest in Earnings","Minority Interest","Earnings from Equity Interest","Earnings of Equity Interest"]);
  const daR   =need(look(CF,["Depreciation & Amortization","Depreciation"]),"D&A (Cash Flow)");
  const amortR=look(CF,["Amortization of Goodwill and Intangible Assets"]);
  const capexR=look(CF,["Capital Expenditure","Capital Expenditures"]);

  const sales=lastVal(salesR), ebit=lastVal(ebitR), shares=lastVal(sharesR);
  const da=Math.abs((lastVal(daR)||0)+(lastVal(amortR)||0));  // D&A total = depreciación + amortización de intangibles
  const tax=Math.abs(lastVal(taxR)||0);
  const capex=Math.abs(lastVal(capexR)||0);

  // working capital
  const lkEx=(t,keys)=>{ for(const k of keys){ const r=lookEx(t,k); if(r) return r; } return null; };
  const inv=lastVal(lkEx(BS,["Inventory","Total Inventory"]))||0;
  const ar =lastVal(lkEx(BS,["Accounts Receivable","Total Receivables"]))||0;
  const ap =lastVal(lkEx(BS,["Accounts Payable"]))||0;
  const un1=lastVal(lkEx(BS,["Unearned Revenue Current","Unearned Revenue, Current","Deferred Revenue Current","Deferred Revenue, Current"]))||0;
  const un2=lastVal(lkEx(BS,["Unearned Revenue Non Current","Unearned Revenue, Non Current","Deferred Revenue Non Current"]))||0;
  const wc=inv+ar-ap-un1-un2;
  if(ar===0&&ap===0) warn.push("Working capital (revisa Balance Sheet)");

  // deuda neta (préstamos − caja amplia, sin leases; sin doble conteo de caja)
  const stb=(lastVal(look(BS,["Short-term Borrowings","Short-Term Borrowings"]))||0)+(lastVal(look(BS,["Current Portion of Long-Term Debt","Current Portion of Long Term Debt"]))||0);
  const ltb=lastVal(look(BS,["Long-Term Debt","Long-term Borrowings","Long-Term Borrowings"]))||0;
  const cashSti=lastVal(look(BS,["Total Cash And Short Term Investments","Total Cash and Short-Term Investments"]));
  const cashEq=lastVal(look(BS,["Cash And Equivalents","Cash and Equivalents"]))||0;
  const sti=lastVal(look(BS,["Short Term Investments","Short-Term Investments"]))||0;
  const cash=(cashSti!=null?cashSti:(cashEq+sti));
  let netDebt;
  if(stb||ltb||cash){ netDebt=(stb+ltb)-cash; }
  else { const td=lastVal(look(BS,["Total Debt"]))||0; netDebt=td-(cash||0); warn.push("Deuda neta (revisa Balance Sheet)"); }

  // año base
  const yi=lastIdx(salesR);
  const baseYear=(IS.years&&IS.years[yi])||d.baseYear||(new Date().getFullYear()-1);

  // beneficio neto base (si no se halla, se aproxima)
  let ni=lastVal(niR);
  if(ni==null) ni=(ebit||0)*(1-0.21);

  // series para supuestos
  const salesS=salesR?salesR.vals:[], ebitS=ebitR?ebitR.vals:[], sharesS=sharesR?sharesR.vals:[];
  const taxS=taxR?taxR.vals:[], capexS=capexR?capexR.vals:[];
  const ebitda0=(ebit||0)+da;
  const gGrowth=median(last3(yoy(salesS)));
  const gMargin=median(last3(ratio(ebitS,salesS)));
  const gTax=median(last3(ratio(taxS.map(x=>x==null?null:Math.abs(x)),ebitS)));
  const gShare=median(last3(yoy(sharesS)));
  const gCapex=median(last3(ratio(capexS.map(x=>x==null?null:Math.abs(x)),salesS)));
  const gWc=(sales? wc/sales:0);
  const gNd=(ebitda0? netDebt/ebitda0:0);
  const fill=(v,fb)=>{ const x=(v==null||!isFinite(v))?fb:v; return [x,x,x,x,x]; };

  const c=blankCompany();
  c.name=d.name||"Nueva empresa"; c.ticker=d.ticker; c.sector=d.sector; c.currency=d.currency;
  c.baseYear=baseYear;
  c.base={ sales:sales||0, ebit:ebit||0, da:da||0, ni:ni||0,
           fcf:Math.round((ebitda0 - capex - tax)) , shares:shares||0,
           netDebt:Math.round(netDebt), wc:Math.round(wc), price:d.price===""?0:d.price,
           minority:(lastVal(minR)||0) };
  c.growth=fill(gGrowth,0.10);
  c.ebitMargin=fill(gMargin, sales&&ebit?ebit/sales:0.20);
  c.taxRate=fill(gTax!=null?Math.min(Math.max(gTax,0),0.40):0.21, 0.21);
  c.shareChg=fill(gShare,0);
  c.capexPct=fill(gCapex,0.05);
  c.wcPct=fill(gWc,0);
  c.ndEbitda=fill(gNd,0);
  c._warn=warn;
  c.stmts={is:d.is||"", bs:d.bs||"", cf:d.cf||"", val:d.val||"", est:""};
  // Múltiplos históricos + medianas como múltiplo de salida de partida
  if((d.val||"").trim()){
    try{
      const hm=computeTemplateMultiples(c.stmts, c);
      if(hm){
        c.histMult=hm;
        let n=0;
        ["evfcf","pe","evebitda","evebit"].forEach(k=>{
          const m=medOf(c,k);
          if(m!=null&&isFinite(m)&&m>0){ c.mult[k]=round(m,1); n++; }
        });
        if(n) c.multFromMedian=true;
      } else warn.push("No pude calcular los múltiplos: revisa la tabla Valuation.");
    }catch(e){ warn.push("No pude calcular los múltiplos históricos."); }
  }
  try{ c.niCalc=computeNiCalc(c)||undefined; }catch(e){}
  try{ const fu0=computeFundamentals(c); if(fu0&&fu0.rows.length){ const lr=fu0.rows[fu0.rows.length-1]; if(lr.netInt!=null&&isFinite(lr.netInt)) c.base.netInt=Math.round(lr.netInt); } }catch(e){}
  // Auto-fill inteligente de Deuda neta/EBITDA: proyecta el desapalancamiento desde el FCF retenido (lo no reinvertido en crecimiento)
  try{
    const fu=computeFundamentals(c);
    if(fu&&fu.rows.length && c.base.netDebt>0){
      const rr=fu.rows.map(r=>r.reinvRate).filter(x=>x!=null&&isFinite(x)&&x>=0).sort((a,b)=>a-b);
      const medReinv=rr.length?(rr.length%2?rr[(rr.length-1)/2]:(rr[rr.length/2-1]+rr[rr.length/2])/2):0.5;
      const retain=Math.max(0, Math.min(0.6, 1-medReinv));
      if(retain>0.02){
        const pre=project(c);   // FCF con ndEbitda plano (provisional)
        let nd=c.base.netDebt; const arr=[];
        for(let i=0;i<5;i++){ nd=nd-(pre.fcf[i]||0)*retain; arr.push(pre.ebitda[i]? nd/pre.ebitda[i] : 0); }
        c.ndEbitda=arr;
      }
    }
  }catch(e){}

  state.draftCompany=c;
  render();
  window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
  toast(warn.length?("Extraído con "+warn.length+" aviso(s)"):"Datos extraídos");
}

/* init */
load(); render();
</script>
